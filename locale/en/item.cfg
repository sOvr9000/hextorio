[item-description]
black-hole-coin=[font=heading-1][color=gray]TIER 5 COIN[.color][.font]\nYou're trading BLACK HOLES now?\n[color=red]-9999% to Survivability.[.color]\n\n[color=gray]Contains a miniature black hole, granting you power that not even the cosmos can control.[.color]\n\nAuto-converted to lower tiers as needed:\n[img=item.hexaprism-coin]x1000 <--> [img=item.black-hole-coin]x1
claim-tool=Enqueue [entity=hex-core] hex cores in the selected area to be claimed.\n\n__CONTROL__reverse-select__: Dequeue\n__CONTROL__alt-reverse-select__: Include hexes without [entity=hex-core] hex cores
delete-core-tool=Delete all hex cores in the selected area.
demolisher-capsule=Deploys demolishers, which are unironically strong versus demolishers of all sizes.
electromagnetic-penetrator-cell=Does not get consumed on use.
electromagnetic-penetrator=Similar to a kinetic penetrator, but uses advanced EM technology.
gravity-coin=[font=heading-1][color=purple]TIER 2 COIN[.color][.font]\nCan be traded.\n\nSymbolizes your ability to escape the gravity of any planet.\n\nAuto-converted to higher or lower tiers as needed:\n[img=item.hex-coin]x1000 <--> [img=item.gravity-coin]x1\n[img=item.gravity-coin]x1000 <--> [img=item.meteor-coin]x1
hex-coin=[font=heading-1][color=yellow]TIER 1 COIN[.color][.font]\nCan be traded.\n\nAuto-converted to higher tiers as needed:\n[img=item.hex-coin]x1000 <--> [img=item.gravity-coin]x1
hexadic-resonator=Enqueues [font=heading-2][color=green]__1__[.color][.font] free item __plural_for_parameter__1__{1=buff|rest=buffs}__, enhancing the cheapest item buff at no coin cost.\n\nRequires the cheapest buff to cost less than [font=heading-2][color=green]60x[.color][.font] your [font=default-semibold][color=yellow]net coin production[.color][.font] (shown in the hex rank GUI). If not, the buff is queued until the condition is met.
hexaprism-coin=[font=heading-1][color=blue]TIER 4 COIN[.color][.font]\nCan be traded.\n[color=cyan]+1000% to Bragging Rights.[.color]\n\nThe sparkling of this coin can be seen from space.\n\nAuto-converted to higher or lower tiers as needed:\n[img=item.meteor-coin]x1000 <--> [img=item.hexaprism-coin]x1\n[img=item.hexaprism-coin]x1000 <--> [img=item.black-hole-coin]x1
hexaprism=A crystalline shard of pure hexagonal energy. Only the most experienced engineer can make use of this.
hexport-tool=Enable all hexports in the selected area, or disable by reverse-selecting (RMB and drag).
magmatic-rounds-magazine=Put everything into the incinerator.
meteor-coin=[font=heading-1][color=cyan]TIER 3 COIN[.color][.font]\nCan be traded.\n\nSymbolizes your ability to ward off large asteroids on your way to a distant planet.\n\nAuto-converted to higher or lower tiers as needed:\n[img=item.gravity-coin]x1000 <--> [img=item.meteor-coin]x1\n[img=item.meteor-coin]x1000 <--> [img=item.hexaprism-coin]x1
plague-rocket=Significantly more potent than [item=poison-capsule].
sentient-spider=[font=heading-2][color=yellow]This spidertron has undergone an artificial imbuement of consciousness and spiritual energy. Her superintelligence, benignity, and fascination with industry leads her to welcome your presence into her world of Factorio. The factory must grow.[.color][.font]
spider-network-tool=Add all hex cores in the selected area to the spider network, or remove by reverse-selecting (RMB and drag).
starter-pack-hexaclysm=Automatically deploys a Hexaclysm-class vessel.
tesla-destroyer-capsule=One of the more advanced combat robots. Follows the player and shoots arcing bolts of electricity at nearby enemies.
tesla-discharge-defense-equipment=Damages, pushes back and stuns nearby enemies automatically.
