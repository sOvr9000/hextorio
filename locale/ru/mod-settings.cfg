hextorio-base-trade-prod-gleba=Модификатор производительности сделок на [planet=gleba].\n\n[color=gray]Это обрабатывается так же как производительность рецепта.[.color]
hextorio-base-trade-prod-aquilo=Модификатор производительности сделок на [planet=aquilo].\n\n[color=gray]Это обрабатывается так же как производительность рецепта.[.color]
hextorio-increment-trade-quality=При обновлении качества гекс-ядра автоматически обновлять качество каждой сделки, чтобы совпадать с качеством гекс-ядра.
hextorio-trade-batching-threshold=Когда количество сделок на выбранных планетах превышает этот порог, обзор сделок будет показывать полосы прогресса и обрабатывать сделки в пакетах на нескольких тиках, чтобы предотвратить задержку. Снизьте если обзор сделок замораживает игру при изменении фильтров.
hextorio-trade-collection-batch-size=Контролирует как много сделок собирается с выбранных планет за тик при загрузке обзора сделок. Снизьте если УПС падает, пока эта полоса прогресса обновляется.
hextorio-trade-filtering-batch-size=Контролирует как много сделок фильтруется за тик при загрузке обзора сделок. Снизьте если УПС падает, пока эта полоса прогресса обновляется.
hextorio-trade-sorting-batch-size=Контролирует как много сделок проверяется за тик при определении которые сделки показывать в верхней части обзора сделок. Снизьте если УПС падает, пока эта полоса прогресса обновляется.
hextorio-hex-pool-size=Отрегулируйте размер пула гексов. Снизьте чтобы потенциально улучшить УПС на больших сохранениях.
hextorio-item-buff-cost-scale=Множитель стоимости предмета, который используется как стоимость разблокировки бонусов того предмета в каталоге.
hextorio-item-buff-cost-base=База экспоненции, используемая для масштабирования значения за пределы стоимости разблокировки для получения стоимости улучшения бонусов предмета.\n\nМалые изменения этого номера с значением по умолчанию сильно влияют на балансировку игры.
hextorio-trade-flying-text=Будут ли летающие тексты излучаться для сделки, которая только что завершилась.
hextorio-dungeon-hexlight-color=Гекс-ядра внутри подземелий светятся ярко с этим цветом до присвоения.
hextorio-default-nauvis-hexlight-color=Гекс-ядра на [planet=nauvis] светятся ярко с этим цветом, кроме случаев переопределения сетью схем.
hextorio-default-vulcanus-hexlight-color=Гекс-ядра на [planet=vulcanus] светятся ярко с этим цветом, кроме случаев переопределения сетью схем.
hextorio-default-fulgora-hexlight-color=Гекс-ядра на [planet=fulgora] светятся ярко с этим цветом, кроме случаев переопределения сетью схем.
hextorio-default-gleba-hexlight-color=Гекс-ядра на [planet=gleba] светятся ярко с этим цветом, кроме случаев переопределения сетью схем.
hextorio-default-aquilo-hexlight-color=Гекс-ядра на [planet=aquilo] светятся ярко с этим цветом, кроме случаев переопределения сетью схем.
hextorio-strongbox-spawn-chance=Шанс каждого гекса спавна сейфа. Это как цели достижения ДПС, дающие награды.
hextorio-strongbox-loot-scale=Множитель стоимости добычи (монеты или другие вещи) за каждую победу против сейфа.
hextorio-quest-completion-sound=Каждый игрок слышит только свой выбор из этой настройки.
hextorio-show-hex-rank-hud=Показывать ли текущий ранг гекса в верхней части экрана.
hextorio-show-intro=Включите это чтобы открыть вводный GUI Hextorio.

