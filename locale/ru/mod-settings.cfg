[mod-setting-description]
hextorio-atomic-bomb-damage-multiplier=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель урона от [item=atomic-bomb]. Если не снизить, то разграбление подземелий будет слишком легко. Установите на 1.0 для оригинального урона.
hextorio-base-trade-efficiency=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\n[color=cyan]Отношение общего значения каждой сделки от выхода к входу.[.color]\n\n[color=gray]Если установить это слишком близко или выше 1, будет возможно найти циклы между сделками, которые генерируют предметы бесконечно.\n\n[font=default-semibold]Рекомендуемая установка для удаления возможности бесконечных предметов из циклов торговли [font=heading-2]0.2[.font][.font]\n\nИзменения вступают в силу немедленно для новых сделок.[.color]
hextorio-unresearched-penalty=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nШтраф, применяемый к производительности сделок для сделок, которые дают предметы, которые еще не исследованы. Штраф удаляется после исследования всех предметов в выходах сделки.\n\nНо штраф не применяется к сделкам с неисследованными предметами в их входах.\n\nУстановите на 0 для отсутствия штрафов везде.\n\n[color=gray]Может быть отрицательным для противоположного эффекта.[.color]
hextorio-allow-two-headed-trains=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nРазрешить ли двухголовые поезда при торговле предметами. Если включено, когда "Базовая эффективность сделок" достаточно велика для разрешения бесконечных циклов монет, возможна эксплуатация, которая производит игро-ломающее количество монет.
hextorio-hex-claim-cost-mult-nauvis=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель стоимости присвоения гексов на [planet=nauvis]. Установите более низкое значение, если снижаете "Базовую эффективность сделок" (БЭС).\n\nСWithБЭС = 1.0, рекомендуется установить на 1.0.\n\nСБЭС = 0.2, рекомендуется установить на [font=heading-2]0.5[.font].\n\n[color=gray]Изменения вступают в силу немедленно.[.color]
hextorio-hex-claim-cost-mult-vulcanus=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель стоимости присвоения гексов на [planet=vulcanus]. Установите более низкое значение, если снижаете "Базовую эффективность сделок" (БЭС).\n\nСБЭС = 1.0, рекомендуется установить на 1.0.\n\nСБЭС = 0.2, рекомендуется установить на [font=heading-2]0.1[.font].\n\n[color=gray]Изменения вступают в силу немедленно.[.color]
hextorio-hex-claim-cost-mult-fulgora=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель стоимости присвоения гексов на [planet=fulgora]. Установите более низкое значение, если снижаете "Базовую эффективность сделок" (БЭС).\n\nСБЭС = 1.0, рекомендуется установить на 1.0.\n\nСБЭС = 0.2, рекомендуется установить на [font=heading-2]0.1[.font].\n\n[color=gray]Изменения вступают в силу немедленно.[.color]
hextorio-hex-claim-cost-mult-gleba=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель стоимости присвоения гексов на [planet=gleba]. Установите более низкое значение, если снижаете "Базовую эффективность сделок" (БЭС).\n\nСБЭС = 1.0, рекомендуется установить на 1.0.\n\nСБЭС = 0.2, рекомендуется установить на [font=heading-2]0.1[.font].\n\n[color=gray]Изменения вступают в силу немедленно.[.color]
hextorio-hex-claim-cost-mult-aquilo=[img=utility.warning_icon] [font=heading-2][color=yellow]ОПЦИЯ БАЛАНСИРОВКИ[.color][.font]\n\nМножитель стоимости присвоения гексов на [planet=aquilo]. Установите более низкое значение, если снижаете "Базовую эффективность сделок" (БЭС).\n\nСБЭС = 1.0, рекомендуется установить на 1.0.\n\nСБЭС = 0.2, рекомендуется установить на [font=heading-2]0.01[.font].\n\n[color=gray]Изменения вступают в силу немедленно.[.color]
hextorio-nauvis-filled-edges=[img=virtual-signal.signal-alert] [font=heading-2][color=red]ОПЦИЯ СМЕРТЕЛЬНОГО МИРА[.color][.font]\n\nВсе края гексов на [planet=nauvis] предварительно заполнены. Рекомендуемый опыт смертельного мира - установить частоту кусачей на максимум.\n\n[color=gray]Оказывает очень большое влияние на игровой процесс. Рекомендуется начать новую игру.[.color]
hextorio-nauvis-grace=[img=virtual-signal.signal-alert] [font=heading-2][color=red]ОПЦИЯ СМЕРТЕЛЬНОГО МИРА[.color][.font]\n\nХекс спавна начинается с пушек и ограниченных боеприпасов.
hextorio-claimed-hex-tile=Плитка, используемая для мощения присвоенных гексов.
hextorio-edge-fill-tile=Плитка, используемая для заполнения краев между присвоенными гексами.
hextorio-base-resource-richness=Множитель того, насколько богаты ресурсы на всех планетах. Также зависит от ползунков богатства в настройках генерации карты.
hextorio-iron-ore-frequency=Относительная скорость, с которой [item=iron-ore] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-copper-ore-frequency=Относительная скорость, с которой [item=copper-ore] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-nauvis-coal-frequency=Относительная скорость, с которой [item=coal] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-nauvis-stone-frequency=Относительная скорость, с которой [item=stone] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-uranium-ore-frequency=Относительная скорость, с которой [item=uranium-ore] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-nauvis-crude-oil-frequency=Относительная скорость, с которой [entity=crude-oil] спавнится на [planet=nauvis]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-vulcanus-coal-frequency=Относительная скорость, с которой [item=coal] спавнится на [planet=vulcanus]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-calcite-frequency=Относительная скорость, с которой [item=calcite] спавнится на [planet=vulcanus]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-tungsten-ore-frequency=Относительная скорость, с которой [item=tungsten-ore] спавнится на [planet=vulcanus]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-aquilo-crude-oil-frequency=Относительная скорость, с которой [entity=crude-oil] спавнится на [planet=aquilo]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-lithium-brine-frequency=Относительная скорость, с которой [entity=lithium-brine] спавнится на [planet=aquilo]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-fluorine-vent-frequency=Относительная скорость, с которой [entity=fluorine-vent] спавнится на [planet=aquilo]. Также зависит от соответствующего ползунка частоты в настройках генерации карты.
hextorio-min-uranium-dist=Расстояние (в плитках гексов) от спавна, на котором [item=uranium-ore] генерируется на [planet=nauvis].
hextorio-min-tungsten-dist=Расстояние (в плитках гексов) от спавна, на котором [item=tungsten-ore] генерируется на [planet=vulcanus].
hextorio-tungsten-bias-chance=Шанс того, что руды гекса на [planet=vulcanus] будут в основном содержать [item=tungsten-ore].
hextorio-resource-conversion-cost-multiplier=Множитель стоимости преобразования рудных объектов в рудные объекты, улучшение, разблокируемое из квеста.
hextorio-starting-hex-resource-stroke-width-nauvis=Ширина рудного отложения внутри стартового гекса на [planet=nauvis].
hextorio-starting-hex-resource-stroke-width-vulcanus=Ширина рудного отложения внутри стартового гекса на [planet=vulcanus].
hextorio-starting-hex-resource-stroke-width-fulgora=Ширина рудного отложения внутри стартового гекса на [planet=fulgora].
hextorio-starting-hex-resource-stroke-width-gleba=Ширина рудного отложения внутри стартового гекса на [planet=gleba].
hextorio-base-resource-width-nauvis=Минимальная ширина ресурсов на гекс, который имеет ресурсы на [planet=nauvis].
hextorio-base-resource-width-vulcanus=Минимальная ширина ресурсов на гекс, который имеет ресурсы на [planet=vulcanus].
hextorio-base-resource-width-fulgora=Минимальная ширина ресурсов на гекс, который имеет ресурсы на [planet=fulgora].
hextorio-base-resource-width-gleba=Минимальная ширина ресурсов на гекс, который имеет ресурсы на [planet=gleba].
hextorio-resource-width-per-dist-nauvis=Количество ширины ресурса, добавляемого на гекс от центра карты на [planet=nauvis].
hextorio-resource-width-per-dist-vulcanus=Количество ширины ресурса, добавляемого на гекс от центра карты на [planet=vulcanus].
hextorio-resource-width-per-dist-fulgora=Количество ширины ресурса, добавляемого на гекс от центра карты на [planet=fulgora].
hextorio-resource-width-per-dist-gleba=Количество ширины ресурса, добавляемого на гекс от центра карты на [planet=gleba].
