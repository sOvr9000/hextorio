hextorio-resource-width-max-vulcanus=Максимальная ширина ресурсов на [planet=vulcanus].
hextorio-resource-width-max-fulgora=Максимальная ширина ресурсов на [planet=fulgora].
hextorio-resource-width-max-gleba=Максимальная ширина ресурсов на [planet=gleba].
hextorio-resource-richness-per-dist-nauvis=Как много богатства ресурсов (включая скважины) увеличивается за гекс от центра карты на [planet=nauvis].
hextorio-resource-richness-per-dist-vulcanus=Как много богатства ресурсов (включая скважины) увеличивается за гекс от центра карты на [planet=vulcanus].
hextorio-resource-richness-per-dist-fulgora=Как много богатства ресурсов (включая скважины) увеличивается за гекс от центра карты на [planet=fulgora].
hextorio-resource-richness-per-dist-gleba=Как много богатства ресурсов (включая скважины) увеличивается за гекс от центра карты на [planet=gleba].
hextorio-resource-richness-per-dist-aquilo=Как много богатства ресурсов (включая скважины) увеличивается за гекс от центра карты на [planet=aquilo].
hextorio-resource-frequency-dropoff-nauvis=Скорость, с которой ресурсы становятся менее частыми в более дальних плитках гексов от спавна на [planet=nauvis].
hextorio-resource-frequency-dropoff-vulcanus=Скорость, с которой ресурсы становятся менее частыми в более дальних плитках гексов от спавна на [planet=vulcanus].
hextorio-resource-frequency-dropoff-fulgora=Скорость, с которой ресурсы становятся менее частыми в более дальних плитках гексов от спавна на [planet=fulgora].
hextorio-resource-frequency-dropoff-gleba=Скорость, с которой ресурсы становятся менее частыми в более дальних плитках гексов от спавна на [planet=gleba].
hextorio-resource-frequency-dropoff-aquilo=Скорость, с которой ресурсы становятся менее частыми в более дальних плитках гексов от спавна на [planet=aquilo].
hextorio-starting-resources-mixed=Смешаны ли ресурсы в стартовом гексе на [planet=nauvis]?
hextorio-default-resources-mixed=Смешаны ли ресурсы в других гексах, включая стартовые гексы других планет?
hextorio-trades-per-hex-nauvis=Количество сделок, которое имеет каждый гекс, кроме стартового гекса на [planet=nauvis].
hextorio-trades-per-hex-vulcanus=Количество сделок, которое имеет каждый гекс, кроме стартового гекса на [planet=vulcanus].
hextorio-trades-per-hex-fulgora=Количество сделок, которое имеет каждый гекс, кроме стартового гекса на [planet=fulgora].
hextorio-trades-per-hex-gleba=Количество сделок, которое имеет каждый гекс, кроме стартового гекса на [planet=gleba].
hextorio-trades-per-hex-aquilo=Количество сделок, которое имеет каждый гекс, кроме стартового гекса на [planet=aquilo].
hextorio-coin-trade-chance=Шанс сделки, включающей монеты.
hextorio-sell-trade-chance=Шанс того, что сделка, включающая монеты, будет одной для продажи предметов вместо покупки предметов.
hextorio-sink-generator-efficiency=Множитель базовой эффективности сделок для сделок, созданных переключением гекс-ядра в режим слива или генератора.
hextorio-quality-cost-multiplier=Множитель стоимости монет для покупки предметов с качеством > [quality=normal]. Более высокие значения ограничивают потенциал для игро-ломающих эксплуатаций сделок.\n\n[color=red][img=virtual-signal.signal-alert] Значение параметра по умолчанию сбалансировано. Снижайте только если вы хотите, чтобы циклы монет постоянно экспоненциировались без границ, генерируя практически бесконечные монеты.[.color]
hextorio-vault-chance=Шанс [entity=fulgoran-ruin-vault] спавна в гексе на [planet=fulgora]. Требуется для технологического древа.
hextorio-fulgoran-attractor-chance=Шанс [entity=fulgoran-ruin-attractor] спавна в гексе на [planet=fulgora].
hextorio-small-egg-raft-chance=Шанс [entity=gleba-spawner-small] спавна вместо обычного [entity=gleba-spawner] на [planet=gleba].
hextorio-tiles-per-quality-nauvis=Качество гекс-ядер и муравейников кусачей на [planet=nauvis] увеличивается с расстоянием от спавна согласно этому количеству, измеренному в плитках гексов.
hextorio-tiles-per-quality-vulcanus=Качество гекс-ядер на [planet=vulcanus] увеличивается с расстоянием от спавна согласно этому количеству, измеренному в плитках гексов.
hextorio-tiles-per-quality-fulgora=Качество гекс-ядер на [planet=fulgora] увеличивается с расстоянием от спавна согласно этому количеству, измеренному в плитках гексов.
hextorio-tiles-per-quality-gleba=Качество гекс-ядер и муравейников пентапод на [planet=gleba] увеличивается с расстоянием от спавна согласно этому количеству, измеренному в плитках гексов.
hextorio-tiles-per-quality-aquilo=Качество гекс-ядер на [planet=aquilo] увеличивается с расстоянием от спавна согласно этому количеству, измеренному в плитках гексов.
hextorio-resource-bias=Сила, с которой смещение применяется к генерации ресурсов, делая смешанные ресурсы более обильными одного ресурса и, таким образом, немного менее смешанными. Отрицательное смещение означает, что один ресурс становится менее обильным в гексе. Ноль означает, что смещение никогда не применяется. Большое положительное смещение означает, что ресурсы становятся в основном несмешанными.
hextorio-resource-bias-variation=Варьируется ли сила смещения случайным образом вверх (или вниз) до указанного выше значения. Если отключено, сила смещения постоянна (как определено выше) для всех гексов. Если включено, некоторые гексы будут полностью смешаны, а другие будут несколько обильны (положительное смещение) или лишены (отрицательное смещение) конкретного ресурса.
hextorio-planet-config-nauvis-energy-coefficient=[font=default-semibold][color=green]Решатель стоимости предметов[.color][.font]\n\nМасштабирует стоимость предметов на основе времени крафта рецепта на [planet=nauvis].
hextorio-planet-config-nauvis-complexity-coefficient=[font=default-semibold][color=green]Решатель стоимости предметов[.color][.font]\n\nМасштабирует стоимость предметов на основе общего количества предметов и жидкостей в рецептах на [planet=nauvis].
hextorio-planet-config-nauvis-spoilable-coefficient=[font=default-semibold][color=green]Решатель стоимости предметов[.color][.font]\n\nМасштабирует стоимость предметов на основе количества скоропортящихся ингредиентов в рецептах на [planet=nauvis].
hextorio-planet-config-nauvis-raw-multiplier=[font=default-semibold][color=green]Решатель стоимости предметов[.color][.font]\n\nОбщий множитель, применяемый к каждому продукту рецепта поверх всех других факторов масштабирования на [planet=nauvis].
