hextorio-notifications-item-ranked-up=Получать уведомления в чате при повышении ранга любого предмета.
hextorio-notifications-extra-trade=Получать уведомления в чате когда [img=rank-2] предмет бронзового ранга вызывает гекс-ядро имеющее дополнительную сделку для него.
hextorio-notifications-interplanetary-trade=Получать уведомления в чате когда [img=rank-3] предмет серебряного ранга вызывает гекс-ядро имеющее [color=cyan]интерпланетарную сделку[.color] для него.
hextorio-notifications-trade-recovered=Получать уведомления в чате когда [img=rank-4] предмет золотого ранга вызывает сделку, которая бы была удалена, чтобы вместо этого быть передана другому гекс-ядру.
hextorio-notifications-strongbox-located=Получать уведомления в чате при обнаружении сейфа.
