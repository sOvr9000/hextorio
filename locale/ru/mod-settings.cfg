hextorio-disable-hextreme-quality=Этот мод добавляет шестой уровень качества. Некоторые функции специально разработаны вокруг него, поэтому отключайте это только если это абсолютно необходимо.\n\n[color=gray]Эта настройка не все еще тестирована и может вызвать крахи.[.color]
