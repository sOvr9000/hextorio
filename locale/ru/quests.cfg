[quest-condition-description]
total-hexes-claimed=Присвойте всего [font=__3__][color=__2__]__1__[.color][.font] гексов.
claimed-hexes-on=Присвойте всего [font=__4__][color=__3__]__1__[.color][.font] гексов на [planet=__2__].
make-trades=Совершите [font=__3__][color=__2__]__1__[.color][.font] __plural_for_parameter__1__{1=сделку|rest=сделок}__.
biter-ramming=Уничтожьте [img=entity.biter-spawner] или [img=entity.spitter-spawner] таранив им [img=item.car] или [img=item.tank].
trades-found=Найдите [font=__3__][color=__2__]__1__[.color][.font] сделок.
hex-span=Присвойте гексы так, чтобы самое длинное прямое расстояние между двумя гексами было по крайней мере [font=__3__][color=__2__]__1__[.color][.font] плиток гексов.
