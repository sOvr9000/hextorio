[quest-description]
ground-zero=Присвойте первые два гекса. Давайте начнем это путешествие!
check-this-out=Сделки в гекс-ядрах имеют полезные кнопки под ними.
biter-rammer=Тараньте машиной спавнер. Это может быть весело!
find-some-trades=Присвойте больше [img=entity.hex-core] гекс-ядер чтобы найти больше сделок! У вас была удача?
too-many-belts=Не достаточно рельс!
remind-me-later=Вы можете отметить сделку как избранную, чтобы она появлялась в верхней части вашего обзора сделок!
look-at-my-score=Получите максимально возможный ранг гекса! Ранг гекса измеряет ваш общий прогресс через игру и Хекторио.
exploration=Присвойте больше гексов. Возьмите то, что по праву ваше!
grabbing-the-milk-nauvis=Вы надолго отсутствуете.
cracking-the-vault=Найдите сейф и вскройте его! Десять раз!
lockbreaker=Вам нужно будет найти больше сейфов, чтобы сделать это.
automated-clearing=Пока вы строите заводы на других планетах, ваши пушки пробивают ящики с добычей!
sprawling-base=Присвойте гексы далеко от спавна в нескольких направлениях. Если бы только был более быстрый способ туда добраться...
too-many-hex-cores=Присвойте столько гексов, что вы начните желать, чтобы они не мешали вашей гипотетической мегабазе.
too-useful-hex-cores=После того, как вы потратили слишком много времени [img=virtual-signal.signal-heart] на ваши гекс-ядра, вы нашли способ сделать их еще более полезными, чем они казались сначала.
this-is-my-planet=Присвойте каждый доступный гекс на [planet=nauvis]. Да, это конечно! ... Или это не так?
true-space-age=Исследуйте каждую (конечную) технологию. С этой силой вы сможете сделать что угодно. Серьезно, взгляните на эту награду!
half-a-gravity=Получите половину [item=gravity-coin]. Просто помните, это будет едва ли карманные изменения, когда вы станете квадриллионером, поэтому не гордитесь собой!
getting-somewhere=Соберите достаточно монет, чтобы начать делать полезные вещи кроме присвоения большего количества гексов!
trades-galore=Найдите множество сделок. Если бы только было что-то, что вы могли бы сделать с теми, которые мусор...
trades-in-circuitry=Когда вы разместите [item=constant-combinator] рядом с [entity=hex-core], его сигналы автоматически настраиваются! Теперь вы можете автоматизировать автоматизацию!
color-coding=Диско лабы? Скорее диско все! :D
i-really-need-that=Молчите и возьмите мои деньги!
i-really-dont-need-that=Пожалуй, одна из более удобных функций, вы можете переключить гекс-ядро в режим слива, который сливает предметы за небольшой возврат монет.
first-bronze-star=Вот так все начинается. Проверьте каталог, чтобы увидеть требования повышения ранга и бонусы предметов!
first-silver-star=Звезды серебра размещают предметы в торговле других планет!
first-gold-star=Вы, вероятно, можете начать торговлю с более высокого качества с такой продуктивностью!
first-red-star=Повышение ранга предметов на нескольких планетах привлекает внимание интергалактических торговцев. Красные звезды размещают предметы в Квантовом базаре!
catalog-initiate=Пришло время повысить ранг ваших предметов. Сколько предметов вы можете сделать на 100%?
catalog-professional=Повышение ранга предметов путем совершения сделок технически делает вас профессионалом в этом.
catalog-master=Сердечный привет тем пентаподам, которые добровольно погибли для дела.
catalog-obsession=Это похоже на то, что ваша фабрика светит красным от всех этих повышений ранга.
catalog-completionist=Конечно, этот квест существует, но посмотрите на эту КЛАСС добычу! Это может сделать торговлю гекстримом прибыльной.
# НЕ ЕЩЁ ИСПОЛЬЗУЕТСЯ
#novice-trader=Активно совершайте сделки с гекс-ядром. Да, технически вы можете сделать это вручную, подав предметы в гекс-ядро, но легче автоматизировать! Стартовый гекс имеет хорошие сделки для этого. Чтобы сделка считалась автоматизированной, вы должны сделать __1__ сделок там за 60 секунд.
#experienced-trader=Настройте вашу фабрику для автоматизации торговли с несколькими гекс-ядрами! Вы, вероятно, нашли хорошие циклы для эффективного выполнения.
#avid-trader=Кажется, вам это нравится! Автоматизируйте торговлю с несколькими гекс-ядрами. Это может быть несколько гекс-ядер в одном большом цикле монет или несколько отдельных циклов.
#obsessive-trader=Это, вероятно, не требуется для оптимального производства, но проверьте. Автоматизируйте торговлю со многими гекс-ядрами.
dark-factorian-dungeon=На этой планете разбросаны подземелья древней, но знакомой цивилизации. Сможете ли вы одолеть хотя бы одно из них?
lazy-looter=Это утомительная работа. Хорошо, что у вас есть дроны, которые могут её выполнить! Особенно если эти дроны — механические паукообразные.
visit-vulcanus=Не потеряй ноги здесь, как тот парень давно, давно.
stepping-on-ants=Он просто маленький, это не может быть так сложно!
stepping-on-beetles=Покаж им, кто владеет этой планетой!
cant-step-on-that=Они не плохие парни в этой истории.
this-is-fine=Это все было частью плана, на самом деле.
grabbing-the-milk-vulcanus=Вы надолго отсутствуете.
copper-flavored-lava=Это не горячнее чая в той одной кухне.
vulcanus-101=Завод каждой планеты начинается с добычи сырого ресурса!
metallurgic-dungeon=Подземелья на этой планете похвальны защитами экстремально высоких температур.
visit-fulgora=У него есть нефть!
my-hair-feels-funny=Это немного приятно. Почему другие приходят сюда и никогда не уходят?
grabbing-the-milk-fulgora=Вы надолго отсутствуете.
electrocution=Советы по безопасности во время грозы пишут только люди, которых никогда не поражала молния. Настоящие эксперты недоступны для консультаций.
tesla-freak=Число больше, потому что есть больше меньших чисел. Это лучшая стратегия, потому что это большее число.
you-are-the-destroyer=Будьте едины с зарядом.
lazy-bastard=Автоматизация крафта была легкой частью.
electromagnetic-dungeon=Подземелья на этой планете похвальны защитами с высоким напряжением.
visit-gleba=Какая красивая планета!
yummy-co=Ваша компания по торговле фруктами юмако процветает здесь!
grabbing-the-milk-gleba=Вы надолго отсутствуете.
five-legs-werent-enough=За всего три дополнительных ноги, они могли бы быть пауками, а пауки действительно круто.
farm-fresh-eggs=Свежие яйца здесь!
farm-fresh-produce=Свежая продукция здесь!
industrial-garden=Возьмите время, чтобы понюхать яд. Или цветы, если вы предпочитаете.
biochemical-dungeon=Подземелья на этой планете похвальны защитами крайне токсичного вещества.
visit-aquilo=Ледяной мрамор, сверкающий в космосе... чувак, твоя мама такая толстая, по этой причине айсберги на этой планете такие далеко друг от друга.
grabbing-the-milk-aquilo=Вы надолго отсутствуете.
i-am-the-demolisher=Будьте едины с 150-килограммовым дождем... то есть снарядами рельсотрона.
collateral-damage=Надеемся, вам не пришлось узнавать тяжелым путем, что ваши собственные рельсотроны могут вас убить.
pond-filler=Вы принесли ровно столько, чтобы заполнить этот пруд. Этот маленький пруд.
world-paver=То, о чем вы всегда мечтали!
overwatch-dungeon=Подземелья на этой планете похвальны защитами крайне дальнего оружия.
dungeon-mastery=Подземелья никогда не мешали тебе. На самом деле, ты думал, что они были только там, чтобы дать больше места на [planet=fulgora] и [planet=aquilo] для заводов.
total-domination=Вы превратили каждый вид инопланетян в технологические достижения для своего оружия массового поражения, и вы чувствуете себя хорошо по этому? Возьми свою "награду".
its-just-a-scratch=Получите красные звездные рейтинги, разбивая свой красивый космический корабль об огромный астероид в открытом космосе, пока он держит гекстримные предметы ранга [img=rank-4]! Ну, это не обязательно должен быть красивый космический корабль...
it-wasnt-good-enough=Этот гекстримный предмет был полным мусором. Ну давайте, кто собирается использовать [item=discharge-defense-equipment,quality=hextreme]? Подождите... плохой пример. Не продавай один из них.
the-factory-must-grow=Разумный паук поможет вам. О, вы собираетесь использовать больше одного? Они один и тот же сознание. Давайте посмотрим, будет ли это работать. Все, что они хотят, это БОЛЬШОЕчисло в заводе в любом случае.

