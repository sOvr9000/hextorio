[questbook-note]
remote-view-to-claim=Используйте дистанционный просмотр для присвоения [img=entity.hex-core] гекс-ядер с любого расстояния.
trades-randomized=Все сделки, кроме начальных, чисто случайны на основе почти равной оценки стоимости.
finding-counts-unclaimed=Вам не нужно присваивать [img=entity.hex-core] гекс-ядро чтобы "найти" его сделки.
new-players-receive=Игроки, присоединившиеся позже, также получают эти предметы.
hex-span-simplified=то есть присваивайте гексы далеко от спавна в противоположных направлениях.
does-not-consume=Это требование не потребляется после завершения квеста.
does-consume=Это требование потребляется после завершения квеста.
multiple-rank-ups=Несколько предметов можно повысить в ранге во время этого.
dungeon-location=Подземелья расположены далеко от спавна.
dungeon-loot-condition=Подберите все сундуки в подземелье чтобы разграбить его.
first-spidertron=Работайте из дома!
no-robot-slots=Гексапорты не имеют слотов для роботов.
trades-require-claim=Сделки работают только когда гекс присвоен.
use-claim-tool=Попробуйте использовать инструмент "Забрать гексы" из вашей строки быстрого доступа!
use-hexport-tool=Попробуйте использовать инструмент "Гексапорт" из вашей строки быстрого доступа!
empty-inventories=Работает только с пустыми инвентарями.
irreversible-action=Это действие необратимо.
low-efficiency=Результирующие сделки неэффективны.
favorite-trade=Отметьте сделку как избранную, нажав на стрелку.
strongbox-chance=Сейфы имеют шанс быть найденными в любом гексе после присвоения.
strongboxes-removable=Сейфы можно удалить бесплатно из гекс-ядра если они мешают.

