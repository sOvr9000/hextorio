[command-help]
add-coins=Добавить монеты в ваш инвентарь.
add-trade=Добавить сделку в гекс-ядро, на которое вы навели курсор.
chart=Открыть чанки планеты в радиусе от спавна.
claim=Захватить наземный гекс или все наземные гексы в диапазоне.
complete-quest=Завершить квест, игнорируя требования прогресса.
disable-quest=Отключить квест, позволяя прогрессу перейти от его предпосылок к следующим квестам.
discover-all=Открыть все предметы в каталоге.
export-item-values=Записать строку в файл script-output. Файл можно загрузить в open-source веб-инструмент Hextorio Item Value Explorer (HIVE).
force-claim=Захватить ЛЮБОЙ гекс или ВСЕ гексы в диапазоне.
get-item-value=Посмотреть стоимость предмета на конкретной планете. Если стоимость не определена для этой планеты, показывается значение [color=cyan]интерпланетарной торговли[.color].
hextorio-commands=Показать все команды, добавленные Hextorio.
hextorio-debug=Подготовить персонажа и игру для отладки.
import-item-values=Импортировать строку, сгенерированную /export-item-values, переназначив некоторые значения предметов.
rank-up=Повысить ранг предмета, игнорируя требования прогресса.
rank-up-all=Повысить ранг всех предметов, открытых в каталоге, игнорируя требования прогресса.
regenerate-trades=Полностью перегенерировать сделки во всех гекс-ядрах.
reload-item-buff-effects=Принудительно сбросить и применить заново все текущие баффы предметов, сохранив их прогресс уровней.
remove-item-value=Удалить стоимость предмета, убрав его из сделок и каталога.
remove-trade=Удалить сделку №x из гекс-ядра, на которое вы навели курсор (индексация начинается с 1).
set-item-value=Пометить предмет как сырьевой ресурс на планете с заданной базовой стоимостью. Затем выполните /solve-item-values, чтобы изменение распространилось на все рецепты.
simple-trade-loops=Вывести все возможные двуступенчатые циклы сделок в игре в файл script-output.
spawn-ship=Создать космический корабль над Nauvis с материалами для постройки.
summon=Призвать любую сущность и любое их количество в текущую позицию персонажа.

