[entity-description]
hex-core=Ядро гекса, способное совершать торговлю предметами. Подключите конвейер в левоё туннель. Подключите конвейер из правого туннеля.
hexport-nauvis=Не требует энергии, заряжает дронов, расширяет логистическую сеть, даёт видимость на карте и может переключаться в гекс-ядре, но не может хранить дронов.
hexport-vulcanus=Не требует энергии, заряжает дронов, расширяет логистическую сеть, даёт видимость на карте и может переключаться в гекс-ядре, но не может хранить дронов.
hexport-fulgora=Не требует энергии, заряжает дронов, расширяет логистическую сеть, даёт видимость на карте и может переключаться в гекс-ядре, но не может хранить дронов.
hexport-gleba=Не требует энергии, заряжает дронов, расширяет логистическую сеть, даёт видимость на карте и может переключаться в гекс-ядре, но не может хранить дронов.
hexport-aquilo=Не требует энергии, заряжает дронов, расширяет логистическую сеть, даёт видимость на карте и может переключаться в гекс-ядре, но не может хранить дронов.
disintegrator=Полезный бот для очистки больших скоплений врагов.
detonator=Не просто взрывает вещи. Это также биологическое супероружие.
demolisher=Быстро уничтожает всё на своём пути.
sentient-spider=(В РАЗРАБОТКЕ)\nХотя они еще ничего не делают, вы можете строить их уже сейчас. Они проснутся позже.\n\n[font=heading-2][color=yellow]Этот спайдертрон прошёл искусственное ритуальное наделение сознанием и духовной энергией. Её сверхинтеллект, доброта и увлечённость промышленностью делают её рады вашему присутствию в её мире Factorio. Фабрика должна расти.[.color][.font]
strongbox=Прочный тайник. При уничтожении каждый игрок получает его монеты, а сам сейф возрождается на более высоком уровне.\n\nСейф [font=default-semibold][color=blue]уровня __1__[.color][.font] не возрождается после уничтожения.\n\nКоличество монет масштабируется от вашего максимального достигнутого [font=default-semibold][color=yellow]чистого производства монет[.color][.font].\n\nПовышение [font=default-semibold][color=yellow]чистого производства монет[.color][.font] задним числом выдаст монеты, которые вы получили бы за уже уничтоженные сейфы.

