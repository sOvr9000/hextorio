[item-description]
hex-coin=[font=heading-1][color=yellow]МОНЕТА 1-ГО ТИРА[.color][.font]\nМожет использоваться для торговли.\n\nАвтоматически конвертируется в высшие тиры при необходимости:\n[img=item.hex-coin]x1000 <--> [img=item.gravity-coin]x1
gravity-coin=[font=heading-1][color=purple]МОНЕТА 2-ГО ТИРА[.color][.font]\nМожет использоваться для торговли.\n\nСимволизирует вашу способность преодолевать гравитацию любой планеты.\n\nАвтоматически конвертируется в высшие или низшие тиры при необходимости:\n[img=item.hex-coin]x1000 <--> [img=item.gravity-coin]x1\n[img=item.gravity-coin]x1000 <--> [img=item.meteor-coin]x1
meteor-coin=[font=heading-1][color=cyan]МОНЕТА 3-ГО ТИРА[.color][.font]\nМожет использоваться для торговли.\n\nСимволизирует вашу способность отражать крупные астероиды на пути к далёкой планете.\n\nАвтоматически конвертируется в высшие или низшие тиры при необходимости:\n[img=item.gravity-coin]x1000 <--> [img=item.meteor-coin]x1\n[img=item.meteor-coin]x1000 <--> [img=item.hexaprism-coin]x1
hexaprism-coin=[font=heading-1][color=blue]МОНЕТА 4-ГО ТИРА[.color][.font]\nМожет использоваться для торговли.\n[color=cyan]+1000% к хвастовству.[.color]\n\nБлеск этой монеты виден из космоса.\n\nАвтоматически конвертируется в высшие или низшие тиры при необходимости:\n[img=item.meteor-coin]x1000 <--> [img=item.hexaprism-coin]x1\n[img=item.hexaprism-coin]x1000 <--> [img=item.black-hole-coin]x1
black-hole-coin=[font=heading-1][color=gray]МОНЕТА 5-ГО ТИРА[.color][.font]\nВы теперь торгуете ЧЁРНЫМИ ДЫРАМИ?\n[color=red]-9999% к выживаемости.[.color]\n\n[color=gray]Содержит миниатюрную чёрную дыру, дающую силу, которую не может обуздать даже космос.[.color]\n\nАвтоматически конвертируется в более низкие тиры при необходимости:\n[img=item.hexaprism-coin]x1000 <--> [img=item.black-hole-coin]x1
hexaprism=Кристаллический осколок чистой гексагональной энергии. Только самый опытный инженер может использовать это.
claim-tool=Поставить в очередь гекс-ядра [entity=hex-core] в выбранной области для захвата.\n\n__CONTROL__reverse-select__: Убрать из очереди\n__CONTROL__alt-reverse-select__: Включить гексы без гекс-ядер [entity=hex-core]
delete-core-tool=Удалить все гекс-ядра в выбранной области.
hexport-tool=Включить все гекспорты в выбранной области или отключить их при обратном выделении (ПКМ и протянуть).
disintegrator-capsule=Развёртывает дезинтеграторы для плавления ваших препятствий.
tesla-discharge-defense-equipment=Автоматически наносит урон, отбрасывает и оглушает близлежащих врагов.
tesla-destroyer-capsule=Один из более продвинутых боевых роботов. Следует за игроком и стреляет дугами электричества в близлежащих врагов.
detonator-capsule=Развёртывает детонаторы для взрыва всего вокруг.
demolisher-capsule=Развёртывает сносители, которые являются иронично сильными против сносителей всех размеров.
sentient-spider=(В РАЗРАБОТКЕ)\nХотя они еще ничего не делают, вы можете строить их уже сейчас. Они проснутся позже.\n\n[font=heading-2][color=yellow]Этот спайдертрон прошёл искусственное ритуальное наделение сознанием и духовной энергией. Её сверхинтеллект, доброта и увлечённость промышленностью делают её рады вашему присутствию в её мире Factorio. Фабрика должна расти.[.color][.font]
plague-rocket=Значительно более мощная, чем [item=poison-capsule].
magmatic-rounds-magazine=Всё это в печь.
electromagnetic-penetrator=Похож на кинетический пенетратор, но использует продвинутую ЭМ-технологию.
electromagnetic-penetrator-cell=Не расходуется при использовании.
hexadic-resonator=Добавляет в очередь [font=heading-2][color=green]__1__[.color][.font] бесплатн__plural_for_parameter__1__{1=ый бафф|rest=ых баффов}__ предметов. Бесплатный бафф будет усиливать самый дешёвый доступный бафф предмета без траты монет!\n\nБесплатные баффы предметов не работают, пока самый дешёвый бафф предмета не будет дешевле [font=heading-2][color=green]60x[.color][.font] от [font=default-semibold][color=yellow]чистого производства монет[.color][.font], как измеряется в вашем графическом интерфейсе ранга гекса.\n\n[color=gray]Баффы предметов могут быть добавлены в очередь, но будут ждать исполнения этого условия перед применением.[.color]

