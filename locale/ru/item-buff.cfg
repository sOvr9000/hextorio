[item-buff-description]
all-buffs-level=Увеличивает уровень всех бонусов предметов без масштабирования их стоимости!\n\n[color=gray]Не применяется к бонусам "Уровень всех бонусов".[.color]
all-buffs-cost-reduced=Снижает стоимость всех бонусов предметов. Этот процент [color=cyan]складывается[.color] с другими бонусами того же типа, поэтому они все умножаются вместе!\n\nВаша текущая общая редукция стоимости составляет [font=heading-2][color=green]__1__x[.color][.font].\n\n[color=gray][font=heading-2]Примеры эффектов[.font]\n2x редукция -> 1/2 обычной стоимости\n3x редукция -> 1/3 обычной стоимости\nДва бонуса +100% -> 4x редукция -> 1/4 обычной стоимости[.color]
unresearched-penalty-reduced=Снижает штраф, применяемый к производительности сделок для сделок, выходы которых содержат еще не исследованные предметы. Этот процент [color=cyan]складывается[.color] с другими бонусами того же типа, поэтому они все умножаются вместе!\n\nВаша текущая общая редукция штрафа составляет [font=heading-2][color=green]__1__x[.color][.font].\n\n[color=gray][font=heading-2]Примеры эффектов[.font]\n2x редукция -> 1/2 обычного штрафа\n3x редукция -> 1/3 обычного штрафа\nДва бонуса +100% -> 4x редукция -> 1/4 обычного штрафа[.color]
passive-coins=Вам периодически выдается эта доля вашего чистого производства монет (производство минус потребление) на основе вашей общей [color=192,192,255]часовой статистики производства[.color].\n\nКаждый игрок получает одинаковую сумму, и эта сумма [color=192, 255, 192]не уменьшается[.color] с большим количеством играющих игроков в сохранении.\n\nЭто также накапливается для вас, если игра запущена [color=255,192,192]пока вас нет в сети[.color].\n\n[font=heading-2]Каждые [color=255,192,255]__plural_for_parameter__2__{1=секунду|rest=__2__ секунд}__[.color], все игроки получают:[.font]\n__1__
train-trading-capacity=Сколько дополнительных [item=cargo-wagon] грузовых вагонов разрешено на один поезд, прибывающий на гекс-ядро для торговли.\n\nТекущее ограничение с общим эффектом этого бонуса составляет __1__ вагонов всего.\n\n[color=gray]Действует только если [font=heading-2][color=orange]Торговля локомотивов[.color][.font] разблокирована[.color]
strongbox-loot=Увеличивает количество добычи, полученной из сейфов. Этот процент [color=cyan]складывается[.color] с другими бонусами того же типа, поэтому они все умножаются вместе!\n\nВаш текущий общий множитель составляет [font=heading-2][color=green]__1__x[.color][.font].
